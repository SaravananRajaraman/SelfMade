<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Generate Icons</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&display=swap" rel="stylesheet">
<style>body{font-family:sans-serif;padding:32px;background:#f5f5f5;}</style>
</head>
<body>
<h2>SelfMade Icon Generator</h2>
<p>Wait for the Sora font to load, then click the button. Two PNG files will download automatically.</p>
<button id="btn" onclick="generate()" style="padding:12px 24px;background:#2A6FDB;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;">Generate &amp; Download Icons</button>
<div id="preview" style="margin-top:24px;display:flex;gap:16px;align-items:flex-end;"></div>

<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas')
  canvas.width = canvas.height = size
  const ctx = canvas.getContext('2d')
  const r = size * 0.224

  // Rounded rect background
  ctx.beginPath()
  ctx.moveTo(r, 0)
  ctx.lineTo(size - r, 0)
  ctx.quadraticCurveTo(size, 0, size, r)
  ctx.lineTo(size, size - r)
  ctx.quadraticCurveTo(size, size, size - r, size)
  ctx.lineTo(r, size)
  ctx.quadraticCurveTo(0, size, 0, size - r)
  ctx.lineTo(0, r)
  ctx.quadraticCurveTo(0, 0, r, 0)
  ctx.closePath()
  ctx.fillStyle = '#1A1A1A'
  ctx.fill()

  const fs = Math.round(size * 0.52)
  ctx.font = `800 ${fs}px 'Sora', 'Arial Black', sans-serif`
  ctx.textBaseline = 'middle'

  // Measure "S" and "." to center them together
  const sw = ctx.measureText('S').width
  const pw = ctx.measureText('.').width
  const total = sw + pw
  const startX = (size - total) / 2

  ctx.fillStyle = '#ffffff'
  ctx.fillText('S', startX, size * 0.535)
  ctx.fillStyle = '#2A6FDB'
  ctx.fillText('.', startX + sw, size * 0.535)

  return canvas
}

function generate() {
  // Wait a tick for font
  setTimeout(() => {
    const preview = document.getElementById('preview')
    preview.innerHTML = ''
    for (const size of [192, 512]) {
      const canvas = drawIcon(size)
      preview.appendChild(canvas)

      canvas.toBlob(blob => {
        const a = document.createElement('a')
        a.href = URL.createObjectURL(blob)
        a.download = `icon-${size}.png`
        a.click()
      }, 'image/png')
    }
    document.getElementById('btn').textContent = '✓ Done — check your Downloads folder'
  }, 100)
}

// Auto-run after font loads
document.fonts.ready.then(() => {
  document.getElementById('btn').textContent = 'Generate & Download Icons (font ready ✓)'
})
</script>
</body>
</html>
